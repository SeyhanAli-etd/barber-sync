version: '3.8'
services:
  db:
    image: postgres:16-alpine
    container_name: barber-sync-db
    restart: always
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=barber-sync-db
    ports:
      - '5432:5432'
    volumes:
      - ./pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
